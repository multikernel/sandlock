name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Run unit tests
        run: cargo test --release --lib -- --test-threads=1

      - name: Run integration tests
        run: cargo test --release --test integration -- --test-threads=1

  rust-riscv64-cross:
    name: Rust cross-build (riscv64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (riscv64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-linux-gnu

      - name: Install riscv64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # Build-only: GitHub has no riscv64 runner, and seccomp/Landlock do not
      # emulate faithfully under qemu-user, so the suite runs on a real riscv64
      # host instead. This guards the port against compile regressions.
      - name: Cross-build
        env:
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
        run: cargo build --release --target riscv64gc-unknown-linux-gnu

  cbindgen-header:
    name: cbindgen header up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen --version 0.29.2 --locked

      # Regenerate include/sandlock.h in place and fail if it differs from the
      # committed copy, so the C ABI header can never drift from the crate's
      # #[no_mangle] definitions.
      - name: Regenerate header and check it is up to date
        run: |
          cbindgen --config crates/sandlock-ffi/cbindgen.toml \
            --crate sandlock-ffi \
            --output crates/sandlock-ffi/include/sandlock.h
          git diff --exit-code crates/sandlock-ffi/include/sandlock.h \
            || { echo "::error::sandlock.h is stale; regenerate it with cbindgen (see crates/sandlock-ffi/cbindgen.toml)"; exit 1; }

  python:
    name: Python tests (${{ matrix.runner }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Python SDK
        working-directory: python
        run: |
          pip install pytest
          pip install -e '.[mcp]'

      - name: Run Python tests
        working-directory: python
        run: pytest tests/ -v

  go:
    name: Go SDK (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build FFI library
        run: cargo build --release -p sandlock-ffi

      - name: Vet and test
        working-directory: go
        run: |
          go vet ./...
          go test ./... -v
