name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build Rust binaries and shared library.
  # x86_64 is pinned to ubuntu-22.04 (glibc 2.35) so release binaries run on
  # older distros (Ubuntu 22.04+, Debian 12+, RHEL 9+). aarch64 builds on
  # ubuntu-24.04-arm (glibc 2.39): the runner matches the rest of CI; older
  # aarch64 distros can build from source until a 22.04-arm runner is wired in.
  # riscv64 is cross-compiled on x86_64 (GitHub has no riscv64 runner). It is
  # marked experimental: the binary is never run in CI (seccomp/Landlock do not
  # emulate faithfully under qemu), so a cross-build break must not block the
  # x86_64/aarch64 release or the crates.io/PyPI publish.
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-24.04-arm
          - target: riscv64gc-unknown-linux-gnu
            runs-on: ubuntu-latest
            cross-cc: riscv64-linux-gnu-gcc
            cross-pkg: gcc-riscv64-linux-gnu
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cross-targets need a C cross-toolchain and the matching linker/CC env
      # vars (the names are derived from the target triple, per cargo and the
      # cc crate conventions). Native targets skip this step.
      - name: Set up cross toolchain
        if: matrix.cross-cc
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross-pkg }}
          triple_upper=$(echo '${{ matrix.target }}' | tr 'a-z-' 'A-Z_')
          triple_lower=$(echo '${{ matrix.target }}' | tr '-' '_')
          echo "CARGO_TARGET_${triple_upper}_LINKER=${{ matrix.cross-cc }}" >> "$GITHUB_ENV"
          echo "CC_${triple_lower}=${{ matrix.cross-cc }}" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sandlock dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libsandlock_ffi.so dist/ 2>/dev/null || true
          tar -czf sandlock-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sandlock-${{ matrix.target }}
          path: sandlock-${{ matrix.target }}.tar.gz

  # Build Python sdist (includes setup.py that builds Rust on install)
  sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        working-directory: python
        run: |
          pip install build
          python -m build --sdist .

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # Build pre-compiled wheels so users don't need a Rust toolchain.
  # Each arch builds natively (x86_64 on ubuntu-latest, aarch64 on the ARM
  # runner) — avoids QEMU emulation, which is ~5–10× slower for Rust builds.
  wheels:
    name: Build wheels (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp310-manylinux* cp311-manylinux* cp312-manylinux* cp313-manylinux*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_BEFORE_ALL_LINUX: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> ~/.bashrc
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}
          path: wheelhouse/*.whl

  # Test
  test:
    name: Test (py${{ matrix.python }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install and test
        working-directory: python
        run: |
          pip install pytest
          pip install -e '.[mcp]'
          pytest tests/ -v

  # Publish Rust crates to crates.io
  publish-crates:
    name: Publish to crates.io
    needs: [build, test]
    # Only publish on a real tag push. A manual workflow_dispatch (used to
    # test the build/upload path) must never publish to crates.io.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p sandlock-core
          cargo publish -p sandlock-ffi
          cargo publish -p sandlock-cli

  # Publish Python package to PyPI
  publish-pypi:
    name: Publish to PyPI
    needs: [sdist, wheels, test]
    # Only publish on a real tag push, not on a manual workflow_dispatch.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*

  # Stage a pkg-config-installable tree (libsandlock_ffi.so + sandlock.h +
  # sandlock.pc) so Go SDK users can install the native side from a release
  # asset instead of building it from source. Built natively per arch so the
  # shared library matches the target's glibc, mirroring the `build` job.
  go-libs:
    name: Go native libs (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # PREFIX=/usr/local is baked into the generated sandlock.pc; users extract
      # the tarball into / (so files land under /usr/local) and pkg-config finds
      # it via its default search path.
      - name: Stage pkg-config install tree
        run: |
          make install-go-lib PREFIX=/usr/local DESTDIR="$PWD/stage"
          tar -czf sandlock-go-${{ matrix.target }}.tar.gz -C stage .

      # Smoke-test the released (default, pkg-config) build mode against the very
      # tree we are shipping. Copy the staged files into the real prefix rather
      # than re-running the Makefile, which would invoke cargo under sudo without
      # the toolchain on PATH.
      - name: Verify the Go SDK builds in released mode
        run: |
          sudo cp -a stage/usr/local/. /usr/local/
          sudo ldconfig
          (cd go && go build ./...)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sandlock-go-${{ matrix.target }}
          path: sandlock-go-${{ matrix.target }}.tar.gz

  # Publish the Go module by pushing a subdirectory-prefixed tag. `go get
  # github.com/multikernel/sandlock/go` resolves `go/vX.Y.Z` tags; the plain
  # `vX.Y.Z` release tag does not publish the module. Pushing `go/<ver>` does
  # not re-trigger this workflow, whose tag filter is `v*` (which `go/...` does
  # not match).
  tag-go-module:
    name: Tag Go module
    needs: [build, test, go-libs]
    # Only on a real tag push; a manual workflow_dispatch has no release tag.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push go/<version> tag
        run: |
          gotag="go/${{ github.ref_name }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${gotag}" >/dev/null 2>&1; then
            echo "::notice::${gotag} already exists; leaving it untouched."
            exit 0
          fi
          git tag "${gotag}" "${{ github.sha }}"
          git push origin "${gotag}"

  # Create GitHub Release with Rust binaries
  github-release:
    name: GitHub Release
    needs: [build, test, go-libs]
    # Only cut a GitHub Release on a real tag push, not on a manual
    # workflow_dispatch (which has no tag to attach assets to).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
